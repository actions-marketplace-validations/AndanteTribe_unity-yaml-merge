name: "Unity YAML Merge"
author: "AndanteTribe"
description: "A tool to execute YamlMerge for resolving and merging Unity YAML files."

inputs:
  auto-push:
    description: "Whether to automatically push resolved files back to the repository. Set to 'true' to enable auto-push. Requires github-token with contents: write permission."
    required: false
    default: "true"
  git-user-email:
      description: "Email address used for git commits when auto-push is enabled."
      required: false
      default: "41898282+github-actions[bot]@users.noreply.github.com"
  git-user-name:
      description: "User name used for git commits when auto-push is enabled."
      required: false
      default: "github-actions[bot]"
  github-token:
    description: "GitHub token used for API calls and pushing resolved files. Defaults to the built-in GITHUB_TOKEN. The token must have contents: write permission."
    required: false
    default: ""
  base-branch:
    description: >
      Branch to merge from.
      - On pull_request / pull_request_target events: defaults to the PR's base branch.
      - On all other events: defaults to the repository's default branch (e.g. main).
      Specify explicitly to override either default.
    required: false
    default: ""
  target-extensions:
    description: "Space-separated list of file extensions to check for conflicts. Only files matching these extensions are passed to UnityYAMLMerge. Defaults to unity and prefab, as recommended by the Unity documentation."
    required: false
    default: "unity prefab"
  project-path:
    description: "Path to the Unity project root, relative to the repository root. Used to locate ProjectSettings/ProjectVersion.txt when unity-version-source is project."
    required: false
    default: "."
  unity-version-source:
    description: >
      How to determine the Unity Editor version for the Docker image.
      - project   : read m_EditorVersion from ProjectSettings/ProjectVersion.txt (default).
      - latest-lts: fetch the latest LTS patch version from unity.com/releases/editor/lts-releases.xml.
      - manual    : use the value specified in the unity-version input.
    required: false
    default: "project"
  unity-version:
    description: "Unity Editor version string (e.g. 2022.3.45f1). Ignored unless unity-version-source is manual."
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Configure git credentials
      if: inputs.auto-push == 'true'
      shell: bash
      run: |
        echo "https://x-access-token:${{ inputs.github-token || github.token }}@github.com" > ~/.git-credentials
        chmod 600 ~/.git-credentials
    - name: Run UnityYAMLMerge
      shell: bash
      run: |
        docker run --rm \
          -v $GITHUB_WORKSPACE:$GITHUB_WORKSPACE \
          -w $GITHUB_WORKSPACE \
          -v /var/run/docker.sock:/var/run/docker.sock \
          -v $HOME/.git-credentials:/root/.git-credentials:ro \
          -e GIT_CONFIG_COUNT=1 \
          -e GIT_CONFIG_KEY_0=credential.helper \
          -e GIT_CONFIG_VALUE_0=store \
          andantetribe/unity-yaml-merge-git:latest \
          ${{ inputs.auto-push == 'true' && '--auto-push' || '' }} \
          --git-user-email "${{ inputs.git-user-email }}" \
          --git-user-name "${{ inputs.git-user-name }}" \
          --base-branch "${{ inputs.base-branch || github.event.pull_request.base.ref || github.event.repository.default_branch }}" \
          --target-extensions ${{ inputs.target-extensions }} \
          --project-path "${{ inputs.project-path }}" \
          --unity-version-source "${{ inputs.unity-version-source }}" \
          --unity-version "${{ inputs.unity-version }}"

branding:
    icon: "git-merge"
    color: "blue"