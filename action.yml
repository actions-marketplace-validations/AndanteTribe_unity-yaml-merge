name: "Unity YAML Merge"
author: "AndanteTribe"
description: "A tool to execute YamlMerge for resolving and merging Unity YAML files."

inputs:
  auto-push:
    description: "Whether to automatically push resolved files back to the repository. Set to 'true' to enable auto-push. Requires github-token with contents: write permission."
    required: false
    default: "true"
  github-token:
    description: "GitHub token used for API calls and pushing resolved files. Defaults to the built-in GITHUB_TOKEN. The token must have contents: write permission."
    required: false
    default: ""
  base-branch:
    description: >
      Branch to merge from.
      - On pull_request / pull_request_target events: defaults to the PR's base branch.
      - On all other events: defaults to the repository's default branch (e.g. main).
      Specify explicitly to override either default.
    required: false
    default: ""
  target-extensions:
    description: "Comma-separated list of file extensions to check for conflicts. Only files matching these extensions are passed to UnityYAMLMerge. Defaults to unity and prefab, as recommended by the Unity documentation."
    required: false
    default: "unity,prefab"
  project-path:
    description: "Path to the Unity project root, relative to the repository root. Used to locate ProjectSettings/ProjectVersion.txt when unity-version-source is project."
    required: false
    default: "."
  unity-version-source:
    description: >
      How to determine the Unity Editor version for the Docker image.
      - project   : read m_EditorVersion from ProjectSettings/ProjectVersion.txt (default).
      - latest-lts: fetch the latest LTS patch version from unity.com/releases/editor/lts-releases.xml.
      - manual    : use the value specified in the unity-version input.
    required: false
    default: "project"
  unity-version:
    description: "Unity Editor version string (e.g. 2022.3.45f1). Ignored unless unity-version-source is manual."
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Run UnityYAMLMerge
      shell: bash
      run: |
        docker run --rm \
          -v $GITHUB_WORKSPACE:$GITHUB_WORKSPACE \
          -w $GITHUB_WORKSPACE \
          -e BASE_BRANCH \
          -e TARGET_EXTENSIONS \
          -e PROJECT_PATH \
          -e UNITY_VERSION_SOURCE \
          -e UNITY_VERSION \
          andantetribe/unity-yaml-merge-git:latest \
          ${{ inputs.auto-push-remote != '' && '--auto-push' || '' }} \
          ${{ inputs.auto-push-remote }}
      env:
        BASE_BRANCH: ${{ inputs.base-branch }}
        TARGET_EXTENSIONS: ${{ inputs.target-extensions }}
        PROJECT_PATH: ${{ inputs.project-path }}
        UNITY_VERSION_SOURCE: ${{ inputs.unity-version-source }}
        UNITY_VERSION: ${{ inputs.unity-version }}

branding:
    icon: "git-merge"
    color: "blue"
