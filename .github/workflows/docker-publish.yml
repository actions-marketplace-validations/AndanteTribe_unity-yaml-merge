name: Docker Build and Push

on:
  push:
    branches:
      - main
    tags:
      - "*"

permissions:
  contents: read
  actions: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - dockerfile: src/UnityYamlMerge/Dockerfile
            repository: andantetribe/unity-yaml-merge
          - dockerfile: src/UnityYamlMerge.Git/Dockerfile
            repository: andantetribe/unity-yaml-merge-git

    steps:
      # ghasec-ignore: unpinned-action
      - uses: AndanteTribe/Actions/actions/checkout@main # zizmor: ignore[unpinned-uses] repository-local action reference is intentionally tracked on @main

      - name: Generate Docker image tags
        id: meta
        # ghasec-ignore: unpinned-action
        uses: AndanteTribe/Actions/actions/docker-metadata-action@main # zizmor: ignore[unpinned-uses] repository-local action reference is intentionally tracked on @main
        with:
          images: ${{ matrix.repository }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Set up Docker Buildx
        # ghasec-ignore: unpinned-action
        uses: AndanteTribe/Actions/actions/docker-setup-buildx-action@main # zizmor: ignore[unpinned-uses] repository-local action reference is intentionally tracked on @main

      - name: Log in to Docker Hub
        # ghasec-ignore: unpinned-action
        uses: AndanteTribe/Actions/actions/docker-login-action@main # zizmor: ignore[unpinned-uses] repository-local action reference is intentionally tracked on @main
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push Docker image
        # ghasec-ignore: unpinned-action
        uses: AndanteTribe/Actions/actions/docker-build-push-action@main # zizmor: ignore[unpinned-uses] repository-local action reference is intentionally tracked on @main
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
